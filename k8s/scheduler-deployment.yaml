# =============================================================================
# Scheduler Deployment
# =============================================================================
# The scheduler provides the HTTP API, cron engine, and queue management.
# It is stateless and can be scaled horizontally (though cron jobs run on
# only one instance at a time via distributed locking).
#
# Resources:
#   - Deployment: Manages scheduler pod replicas
#   - Service: Exposes HTTP API and metrics endpoints
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-scheduler
  namespace: default
  labels:
    app: task-scheduler
    component: scheduler
    version: v1
spec:
  replicas: 1  # Typically 1; scale to 2+ for HA (cron uses distributed locks)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: task-scheduler
      component: scheduler
  template:
    metadata:
      labels:
        app: task-scheduler
        component: scheduler
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: task-scheduler
                    component: scheduler
                topologyKey: kubernetes.io/hostname
      containers:
        - name: scheduler
          image: task-scheduler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scheduler-secrets
                  key: redis-password
                  optional: true
            - name: REDIS_DB
              value: "0"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: scheduler-secrets
                  key: postgres-dsn
            - name: SCHEDULER_HTTP_ADDR
              value: ":8080"
            - name: METRICS_ADDR
              value: ":9090"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: task-scheduler
  namespace: default
  labels:
    app: task-scheduler
    component: scheduler
spec:
  type: ClusterIP
  selector:
    app: task-scheduler
    component: scheduler
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: task-scheduler-nodeport
  namespace: default
  labels:
    app: task-scheduler
    component: scheduler
spec:
  type: NodePort
  selector:
    app: task-scheduler
    component: scheduler
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP