# =============================================================================
# PostgreSQL Deployment
# =============================================================================
# PostgreSQL provides durable persistence for jobs, audit history,
# and worker heartbeats. For production, use a managed PostgreSQL
# service (AWS RDS, Cloud SQL, Azure Database) or Patroni for HA.
#
# Resources:
#   - StatefulSet: Ensures stable storage and identity
#   - Service: ClusterIP for internal access
#   - Secret: Database credentials
#   - PersistentVolumeClaim: Data durability
#   - ConfigMap: PostgreSQL configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: default
data:
  postgresql.conf: |
    # Connection settings
    listen_addresses = '*'
    max_connections = 200

    # Memory settings (adjust based on pod limits)
    shared_buffers = 64MB
    effective_cache_size = 192MB
    work_mem = 4MB
    maintenance_work_mem = 16MB

    # Write-ahead logging
    wal_level = replica
    max_wal_size = 1GB
    min_wal_size = 256MB
    checkpoint_timeout = 5min
    checkpoint_completion_target = 0.9

    # Query planner
    random_page_cost = 1.1
    effective_io_concurrency = 200

    # Logging
    log_destination = 'stderr'
    logging_collector = off
    log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on

    # Autovacuum
    autovacuum = on
    autovacuum_max_workers = 3
---
apiVersion: v1
kind: Secret
metadata:
  name: scheduler-secrets
  namespace: default
type: Opaque
stringData:
  postgres-dsn: "postgres://scheduler:scheduler_pass@postgres:5432/taskscheduler?sslmode=disable"
  redis-password: ""
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: default
  labels:
    app: task-scheduler
    component: postgres
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: task-scheduler
      component: postgres
  template:
    metadata:
      labels:
        app: task-scheduler
        component: postgres
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: init-chmod-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data
              chown -R 999:999 /var/lib/postgresql/data
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "scheduler"
            - name: POSTGRES_PASSWORD
              value: "scheduler_pass"
            - name: POSTGRES_DB
              value: "taskscheduler"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - scheduler
                - -d
                - taskscheduler
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - scheduler
                - -d
                - taskscheduler
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: default
  labels:
    app: task-scheduler
    component: postgres
spec:
  type: ClusterIP
  selector:
    app: task-scheduler
    component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: default
  labels:
    app: task-scheduler
    component: postgres
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: task-scheduler
    component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP