# =============================================================================
# Redis Deployment
# =============================================================================
# Redis is used for job queues, distributed locks, worker heartbeats,
# and in-flight job tracking. For production, use Redis Sentinel or
# Redis Cluster for high availability.
#
# Resources:
#   - StatefulSet: Ensures stable network identity and persistent storage
#   - Service: Headless service for StatefulSet
#   - PersistentVolumeClaim: For data durability
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: default
  labels:
    app: task-scheduler
    component: redis
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app: task-scheduler
      component: redis
  template:
    metadata:
      labels:
        app: task-scheduler
        component: redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: default
  labels:
    app: task-scheduler
    component: redis
spec:
  type: ClusterIP
  selector:
    app: task-scheduler
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: default
  labels:
    app: task-scheduler
    component: redis
spec:
  type: ClusterIP
  clusterIP: None  # Headless for StatefulSet
  selector:
    app: task-scheduler
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP